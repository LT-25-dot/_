<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 超級貪食蛇</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a001f, #1a0033);
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 200, 0.1), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 3px solid rgba(0, 255, 200, 0.3);
            padding: 25px 20px 20px;
            box-shadow: 0 0 60px rgba(0, 255, 200, 0.3),
                        inset 0 0 30px rgba(255,255,255,0.1);
            max-width: 440px;
            width: 95%;
        }

        /* ==================== 新增：最頂部大標題 ==================== */
        .top-title {
            text-align: center;
            margin-bottom: 18px;
        }
        
        .top-title h1 {
            font-size: 2.1rem;
            text-shadow: 0 0 20px #00ffcc,
                         0 0 40px #00ffcc;
            letter-spacing: 4px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* ==================== 第二層：選單 + 分數 ==================== */
        header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 8px;
        }
        
        .scores {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }
        
        .score-box {
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 12px;
            border: 2px solid #00ffcc;
            text-align: center;
            min-width: 80px;
        }
        
        .label {
            font-size: 0.65rem;
            opacity: 0.8;
        }
        
        .value {
            font-size: 1.4rem;
            color: #00ffcc;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            border: 6px solid #112233;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.4);
            image-rendering: pixelated;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: nowrap;
        }
        
        button {
            font-family: 'Press Start 2P';
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            padding: 14px 18px;
            box-shadow: 0 8px 0 #880055;
            transition: all 0.1s;
            white-space: nowrap;
            flex: 1;
            min-width: 110px;
        }
        
        button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #880055;
        }
        
        .main-btn {
            background: linear-gradient(#ff00aa, #cc0088);
            color: white;
            box-shadow: 0 8px 0 #880055;
        }
        
        .music-btn {
            background: linear-gradient(#00ccff, #0099cc) !important;
            color: #001122;
            box-shadow: 0 8px 0 #007799 !important;
            min-width: 100px;
            padding: 14px 16px;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 0, 30, 0.95);
            border: 4px solid #ff0066;
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            display: none;
            z-index: 10;
            box-shadow: 0 0 50px #ff0066;
            width: 85%;
        }
        
        .dpad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            gap: 8px;
            margin-top: 15px;
        }
        
        .dpad button {
            width: 60px;
            height: 60px;
            font-size: 28px;
            padding: 0;
            background: linear-gradient(#00ffcc, #00ccaa);
            color: #001122;
            box-shadow: 0 8px 0 #008877;
        }
        
        .dpad button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #008877;
        }

        /* ==================== 漢堡包按鈕 + 側邊選單 ==================== */
        .hamburger {
            background: none;
            border: none;
            width: 50px;
            height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 100;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 3px;
            background: #00ffcc;
            border-radius: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 8px #00ffcc;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -290px;
            width: 290px;
            height: 100vh;
            background: rgba(10, 0, 35, 0.98);
            backdrop-filter: blur(20px);
            border-right: 4px solid rgba(0, 255, 200, 0.5);
            box-shadow: 10px 0 40px rgba(0, 0, 0, 0.7);
            transition: left 0.45s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 3000;
            padding-top: 90px;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(0, 255, 200, 0.15);
            transition: all 0.25s;
        }

        .sidebar li:hover {
            background: rgba(0, 255, 200, 0.12);
            padding-left: 40px;
        }

        .sidebar a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: 1px;
        }

        .sidebar a:hover {
            color: #00ffcc;
            text-shadow: 0 0 12px #00ffcc;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 2999;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <!-- 側邊選單 -->
    <div id="sidebar" class="sidebar">
        <ul>
            <ul>
                <li><a href="index.html">🏠 首頁</a></li>
                <li><a href="MTR.html">🚇 港鐵到站查詢</a></li>
                <li><a href="LR.html">🚋 輕鐵到站查詢</a></li>
                <li><a href="BUS.html">🚌 巴士到站查詢</a></li>
                <li><a href="ALLGAMES.html">🐍 小遊戲</a></li>
        </ul>
    </div>

    <!-- 遮罩層 -->
    <div id="overlay" class="overlay"></div>

    <div class="container">
        
        <!-- 最頂部大標題 -->
        <div class="top-title">
            <h1>🐍 超級貪食蛇</h1>
        </div>

        <!-- 第二層：選單按鈕 + 分數 -->
        <header>
            <!-- 漢堡包按鈕（左上角） -->
            <button id="hamburger" class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <div class="scores">
                <div class="score-box">
                    <div class="label">分數</div>
                    <div class="value" id="score">000</div>
                </div>
                <div class="score-box">
                    <div class="label">最高</div>
                    <div class="value" id="highscore">000</div>
                </div>
            </div>
        </header>
        
        <canvas id="canvas" width="400" height="400"></canvas>
        
        <!-- 控制按鈕區域 -->
        <div class="controls">
            <button onclick="startGame()" class="main-btn">▶ 開始</button>
            <button onclick="togglePause()" class="main-btn">|| 暫停</button>
            <button id="musicBtn" onclick="toggleMusic()" class="music-btn">♪ 音樂</button>
        </div>
        
        <!-- 虛擬方向鍵 -->
        <div class="dpad">
            <div></div>
            <button onclick="changeDirection(0, -1)">↑</button>
            <div></div>
            <button onclick="changeDirection(-1, 0)">←</button>
            <div></div>
            <button onclick="changeDirection(1, 0)">→</button>
            <div></div>
            <button onclick="changeDirection(0, 1)">↓</button>
            <div></div>
        </div>
        
        <p style="text-align:center; margin-top:15px; opacity:0.75; font-size:0.75rem; line-height:1.4;">
            滑動螢幕或按方向鍵<br>
            吃🍎讓蛇變長！<br>
        </p>
        
        <!-- 背景音樂 -->
        <audio id="bgm" loop preload="auto">
            <source src="MUSIC1.mp3" type="audio/mpeg">
            您的瀏覽器不支援音訊播放。
        </audio>
        
        <!-- 遊戲結束畫面 -->
        <div id="gameOver" class="game-over">
            <h2 style="color:#ff0066; margin-bottom:10px; font-size:1.5rem;">GAME OVER</h2>
            <p style="margin-bottom:15px;">你的分數：<span id="finalScore" style="color:#00ffcc; font-size:1.6rem;"></span></p>
            <button onclick="restartGame()" style="width:100%; background:linear-gradient(#00ffcc,#00ccaa); color:#001122; font-size:1.1rem;">再玩一次！</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = 20;
        
        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        let dx = 1;
        let dy = 0;
        let food = {};
        let score = 0;
        let highScore = localStorage.getItem('subwaySnakeHigh') || 0;
        let gameInterval = null;
        let gameSpeed = 120;
        let isPaused = false;
        let gameOverFlag = false;
        
        // 音樂相關
        const bgm = document.getElementById('bgm');
        let musicEnabled = true;
        
        // 初始化最高分
        document.getElementById('highscore').textContent = String(highScore).padStart(3, '0');
        
        function randomFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            return newFood;
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 霓虹網格線
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 畫蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#00ffcc';
                    ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
                    
                    // 眼睛
                    ctx.fillStyle = '#001122';
                    const eye = 4;
                    if (dx === 1) {
                        ctx.fillRect(segment.x * gridSize + 13, segment.y * gridSize + 6, eye, eye);
                        ctx.fillRect(segment.x * gridSize + 13, segment.y * gridSize + 13, eye, eye);
                    } else if (dx === -1) {
                        ctx.fillRect(segment.x * gridSize + 4, segment.y * gridSize + 6, eye, eye);
                        ctx.fillRect(segment.x * gridSize + 4, segment.y * gridSize + 13, eye, eye);
                    } else if (dy === -1) {
                        ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + 4, eye, eye);
                        ctx.fillRect(segment.x * gridSize + 13, segment.y * gridSize + 4, eye, eye);
                    } else {
                        ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + 13, eye, eye);
                        ctx.fillRect(segment.x * gridSize + 13, segment.y * gridSize + 13, eye, eye);
                    }
                } else {
                    const alpha = Math.max(0.7, 1 - index * 0.04);
                    ctx.fillStyle = `rgba(0, 240, 180, ${alpha})`;
                    ctx.fillRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);
                }
            });
            
            // 畫食物
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🍎', food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2 + 1);
        }
        
        function update() {
            if (isPaused || gameOverFlag) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }
            
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    endGame();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = String(score).padStart(3, '0');
                food = randomFood();
                
                if (score % 50 === 0 && gameSpeed > 60) {
                    gameSpeed -= 8;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(gameLoop, gameSpeed);
                }
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function gameLoop() {
            update();
        }
        
        function changeDirection(newDx, newDy) {
            if (newDx === -dx && newDy === -dy) return;
            dx = newDx;
            dy = newDy;
        }
        
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const btn = document.getElementById('musicBtn');
            
            if (musicEnabled) {
                btn.innerHTML = '♪ 音樂';
                if (!isPaused && !gameOverFlag) bgm.play().catch(() => {});
            } else {
                btn.innerHTML = '🔇 音樂';
                bgm.pause();
            }
        }
        
        function startGame() {
            if (gameInterval) clearInterval(gameInterval);
            
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            dx = 1; dy = 0;
            score = 0;
            gameSpeed = 120;
            gameOverFlag = false;
            isPaused = false;
            
            document.getElementById('score').textContent = '000';
            document.getElementById('gameOver').style.display = 'none';
            
            food = randomFood();
            draw();
            
            gameInterval = setInterval(gameLoop, gameSpeed);
            
            if (musicEnabled) {
                bgm.play().catch(() => {});
            }
        }
        
        function endGame() {
            clearInterval(gameInterval);
            gameOverFlag = true;
            bgm.pause();
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('subwaySnakeHigh', highScore);
                document.getElementById('highscore').textContent = String(highScore).padStart(3, '0');
            }
            
            document.getElementById('finalScore').textContent = String(score).padStart(3, '0');
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function togglePause() {
            if (gameOverFlag) return;
            isPaused = !isPaused;
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        // 鍵盤控制
        document.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S': changeDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection(1, 0); break;
            }
        });
        
        // 手機滑動控制
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        
        canvas.addEventListener('touchend', e => {
            if (gameOverFlag || isPaused) return;
            
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY) + 10) {
                if (deltaX > 40) changeDirection(1, 0);
                else if (deltaX < -40) changeDirection(-1, 0);
            } else if (Math.abs(deltaY) > Math.abs(deltaX) + 10) {
                if (deltaY > 40) changeDirection(0, 1);
                else if (deltaY < -40) changeDirection(0, -1);
            }
        });

        // 漢堡包 + 側邊選單 JS
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            const isOpen = sidebar.classList.toggle('open');
            overlay.classList.toggle('show');

            const spans = hamburger.querySelectorAll('span');
            if (isOpen) {
                spans[0].style.transform = 'rotate(45deg) translate(6px, 6px)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
            } else {
                spans[0].style.transform = '';
                spans[1].style.opacity = '';
                spans[2].style.transform = '';
            }
        }

        hamburger.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                if (!link.classList.contains('active')) {
                    console.log('前往：' + link.textContent);
                }
                toggleSidebar();
            });
        });

        window.onload = () => {
            food = randomFood();
            draw();
            document.getElementById('musicBtn').innerHTML = '♪ 音樂';
        };
    </script>
</body>
</html>
